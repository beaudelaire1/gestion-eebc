name: eebc_mobile
description: "EEBC Church Management Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  # State Management
  provider: ^6.1.1
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  # Navigation
  go_router: ^13.2.0
  # UI Components
  google_fonts: ^8.0.0
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.4
  # Notifications
  firebase_core: ^2.25.4
  firebase_messaging: ^14.7.15
  flutter_local_notifications: ^17.0.0
  # GPS Tracking
  geolocator: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
