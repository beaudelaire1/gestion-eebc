# =============================================================================
# RENDER BLUEPRINT - Gestion EEBC v1.0.0 (Free Tier)
# =============================================================================

services:
  # Application Web Django
  - type: web
    name: gestion-eebc
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /healthz/ping/
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: DJANGO_SETTINGS_MODULE
        value: gestion_eebc.settings.prod
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: eebc-db
          property: connectionString
      # Email Hostinger
      - key: EMAIL_BACKEND
        value: hostinger
      - key: HOSTINGER_API_KEY
        sync: false
      - key: HOSTINGER_EMAIL_HOST
        value: smtp.hostinger.com
      - key: HOSTINGER_EMAIL_PORT
        value: "587"
      - key: HOSTINGER_EMAIL_USE_TLS
        value: "True"
      - key: HOSTINGER_EMAIL_HOST_USER
        sync: false
      - key: HOSTINGER_EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "EEBC <contact@eglise-ebc.org>"
      # Stripe (configuré manuellement dans Render)
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: "https://eglise-ebc.org/don/succes/"
      - key: STRIPE_CANCEL_URL
        value: "https://eglise-ebc.org/don/annule/"
      # Meta WhatsApp Cloud API
      - key: META_WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: META_WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: META_WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: META_WHATSAPP_APP_SECRET
        sync: false
      - key: META_WHATSAPP_API_VERSION
        value: "v23.0"
      # Site
      - key: SITE_URL
        sync: false
      - key: SITE_NAME
        value: "EEBC"
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: eebc-redis
          property: connectionString

  # Worker Celery (tâches asynchrones : emails, imports, rappels)
  - type: worker
    name: gestion-eebc-worker
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A gestion_eebc worker --loglevel=info --concurrency=2
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: DJANGO_SETTINGS_MODULE
        value: gestion_eebc.settings.prod
      - key: SECRET_KEY
        fromService:
          type: web
          name: gestion-eebc
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: eebc-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: eebc-redis
          property: connectionString

  # Redis (broker Celery + cache)
  - type: redis
    name: eebc-redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: allkeys-lru

# Base de données PostgreSQL (Free tier)
databases:
  - name: eebc-db
    region: frankfurt
    plan: free
    databaseName: eebc
    user: eebc_user

# =============================================================================
# CRON JOBS - Tâches planifiées quotidiennes
# =============================================================================

  - type: cron
    name: eebc-daily-notifications
    runtime: python
    region: frankfurt
    plan: starter
    schedule: "0 7 * * *"
    buildCommand: pip install -r requirements/prod.txt
    startCommand: python manage.py run_notifications --all
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: gestion_eebc.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: eebc-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: gestion-eebc
          envVarKey: SECRET_KEY
      - key: SENTRY_DSN
        fromService:
          type: web
          name: gestion-eebc
          envVarKey: SENTRY_DSN
      - key: EMAIL_BACKEND
        value: hostinger
      - key: HOSTINGER_EMAIL_HOST
        value: smtp.hostinger.com
      - key: HOSTINGER_EMAIL_PORT
        value: "587"
      - key: HOSTINGER_EMAIL_USE_TLS
        value: "True"
      - key: HOSTINGER_EMAIL_HOST_USER
        sync: false
      - key: HOSTINGER_EMAIL_HOST_PASSWORD
        sync: false

  - type: cron
    name: eebc-daily-backup
    runtime: python
    region: frankfurt
    plan: starter
    schedule: "0 2 * * *"
    buildCommand: pip install -r requirements/prod.txt
    startCommand: python manage.py backup_db
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: gestion_eebc.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: eebc-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: gestion-eebc
          envVarKey: SECRET_KEY
      - key: SENTRY_DSN
        fromService:
          type: web
          name: gestion-eebc
          envVarKey: SENTRY_DSN
