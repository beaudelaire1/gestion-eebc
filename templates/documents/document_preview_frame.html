<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Aperçu — {{ document.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            padding: 1.25rem;
            background: #fff;
            color: #1f2937;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .preview-code {
            background: #f8f9fa;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.82rem;
            overflow-x: auto;
            max-height: 80vh;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .preview-body h2, .preview-body h3, .preview-body h4, .preview-body h5 {
            color: #0A36FF;
            margin-top: 1.25rem;
        }
        .preview-body p { margin-bottom: 0.5rem; }
        .preview-body table { font-size: 0.82rem; }
        .preview-slide {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            background: #fafafa;
        }
        .preview-error {
            text-align: center;
            padding: 3rem;
            color: #9ca3af;
        }
        .preview-error i { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }
    </style>
</head>
<body>
    {% if preview_html %}
        {{ preview_html|safe }}
    {% elif preview_error %}
        <div class="preview-error">
            <i class="bi bi-eye-slash"></i>
            <p>{{ preview_error }}</p>
        </div>
    {% else %}
        <div class="preview-error">
            <i class="bi bi-file-earmark-x"></i>
            <p>Aucun aperçu disponible pour ce format.</p>
        </div>
    {% endif %}
</body>
</html>
