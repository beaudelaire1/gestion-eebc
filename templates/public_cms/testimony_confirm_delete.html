{% extends "base.html" %}

{% block title %}Supprimer témoignage - EEBC{% endblock %}
{% block page_title %}Supprimer le témoignage{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body text-center p-5">
                <div class="text-danger mb-4">
                    <i class="bi bi-exclamation-circle" style="font-size: 4rem;"></i>
                </div>
                <h4 class="mb-3">Supprimer ce témoignage ?</h4>
                <p class="text-muted mb-4">
                    De : <strong>{{ object.author_name }}</strong>
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'public_cms:testimony_list' %}"
                            class="btn btn-outline-secondary px-4">Annuler</a>
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash me-2"></i>Supprimer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
