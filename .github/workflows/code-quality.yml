name: Code Quality & Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt
        pip install pylint
    
    - name: Pylint analysis
      run: |
        pylint apps gestion_eebc --exit-zero --output-format=json > pylint-report.json || true
    
    - name: Complexity check with radon
      run: |
        pip install radon
        radon cc apps -s -j > complexity.json || true
        radon mi apps -j > metrics.json || true
    
    - name: Upload reports
      uses: actions/upload-artifact@v3
      with:
        name: code-quality-reports
        path: |
          pylint-report.json
          complexity.json
          metrics.json
    
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          try {
            const pylint = JSON.parse(fs.readFileSync('pylint-report.json', 'utf8'));
            const score = pylint.length > 0 ? 'Check passed' : 'Check failed';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Code Quality Analysis\n${score}`
            });
          } catch (e) {
            console.log('Could not parse reports');
          }


  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Activate dependency checking
      uses: dependabot/fetch-metadata@v1
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"
    
    - name: Check for outdated dependencies
      run: |
        pip install pip-audit
        pip-audit --skip-editable --desc || true


  sast:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run SAST with Semgrep
      uses: returntocorp/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/django
          p/python
        generateSarif: true
    
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: semgrep.sarif
      if: always()
