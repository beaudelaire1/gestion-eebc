name: Tests & Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: eebc_test
          POSTGRES_USER: eebc_test
          POSTGRES_PASSWORD: eebc_test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt
    
    - name: Lint with flake8
      run: |
        # Syntax errors & undefined names — fatal
        flake8 apps --count --select=E9,F63,F7,F82 --show-source --statistics
        # Style warnings — also fail the build
        flake8 apps --count --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Format check with black
      run: |
        black --check apps gestion_eebc
    
    - name: Import sorting with isort
      run: |
        isort --check-only apps gestion_eebc
    
    - name: Run tests with pytest
      env:
        DATABASE_URL: postgresql://eebc_test:eebc_test_password@localhost:5432/eebc_test
        DJANGO_SETTINGS_MODULE: gestion_eebc.settings.test
        SECRET_KEY: test-secret-key-for-ci
      run: |
        pytest --cov=apps --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false


  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt
        pip install bandit safety
    
    - name: Run Bandit security check
      run: |
        bandit -r apps gestion_eebc --skip B101,B601,B607
    
    - name: Check for known vulnerabilities
      run: |
        safety check --json
      continue-on-error: true
    
    - name: Django security checks
      env:
        DJANGO_SETTINGS_MODULE: gestion_eebc.settings.prod
        SECRET_KEY: test-secret-key-for-ci
      run: |
        python manage.py check --deploy


  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/prod.txt
    
    - name: Collect static files
      env:
        DJANGO_SETTINGS_MODULE: gestion_eebc.settings.prod
        SECRET_KEY: test-secret-key-for-ci
      run: |
        python manage.py collectstatic --noinput --dry-run
