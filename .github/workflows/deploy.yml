name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["Tests & Linting"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Render
      env:
        RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        if [ ! -z "$RENDER_DEPLOY_HOOK" ]; then
          curl "$RENDER_DEPLOY_HOOK"
          echo "Deployment to Render initiated"
        else
          echo "RENDER_DEPLOY_HOOK not configured"
          exit 1
        fi
    
    - name: Wait for deployment
      run: |
        echo "Waiting for deployment to complete..."
        for i in {1..30}; do
          sleep 10
          echo "Checking deployment status... ($((i*10))s)"
        done
    
    - name: Health check
      run: |
        # À adapter avec votre domaine Render
        # curl -f https://gestion-eebc.onrender.com/health || exit 1
        echo "Health check would be performed here"
    
    - name: Slack notification on success
      if: success()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "✅ Deployment successful",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Gestion EEBC* deployment to production completed successfully\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
    
    - name: Slack notification on failure
      if: failure()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "❌ Deployment failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Gestion EEBC* deployment to production failed\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
